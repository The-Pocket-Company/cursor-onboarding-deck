<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>11 · 岔路口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .cross-layout {
    height: 100%;
    display: grid;
    grid-template-columns: 0.82fr 1.18fr;
    gap: 70px;
    align-items: center;
  }

  .decision-board {
    height: 720px;
    position: relative;
    padding: 48px;
  }

  .question-node {
    position: absolute;
    top: 72px;
    left: 50%;
    width: 500px;
    transform: translateX(-50%);
    padding: 34px 38px;
    border-radius: 32px;
    background: var(--ink);
    color: var(--paper);
    text-align: center;
  }

  .question-node p:first-child {
    color: rgba(250,246,239,0.72);
    font-family: "Space Grotesk", sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .question-node p:last-child {
    margin-top: 10px;
    font-size: 34px;
    line-height: 1.24;
    font-weight: 850;
  }

  .route-card {
    position: absolute;
    bottom: 76px;
    width: 390px;
    min-height: 350px;
    padding: 34px;
    border-radius: 34px;
    background: var(--white);
    border: 3px solid var(--line);
    box-shadow: 0 22px 62px rgba(61,44,25,0.11);
  }

  .route-card.local { left: 68px; border-color: rgba(79,138,82,0.46); }
  .route-card.cloud { right: 68px; border-color: rgba(43,127,184,0.46); }

  .route-card h3 {
    font-size: 44px;
    letter-spacing: -0.035em;
  }

  .route-card p {
    margin-top: 16px;
    color: var(--muted);
    font-size: 24px;
    line-height: 1.45;
    font-weight: 560;
  }

  .fork-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .fork-stroke {
    fill: none;
    stroke-width: 4.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fork-stroke.local { stroke: rgba(79,138,82,0.6); }
  .fork-stroke.cloud { stroke: rgba(43,127,184,0.6); }
</style>
</head>
<body>
<main class="slide">
  <div class="masthead">
    <div class="brand"><span class="brand-mark"></span><span>Cursor Onboarding</span></div>
    <p class="page-no">11 / 20</p>
  </div>

  <div class="content cross-layout">
    <section>
      <p class="kicker">choose your path</p>
      <h2>不要一開始就把自己丟進最複雜的架構</h2>
      <p class="subtitle">先問兩個問題：你只是自己練習，還是要讓別人連上？你需要真實雲端服務，還是本機跑起來就好？</p>
    </section>

    <section class="node decision-board">
      <div class="question-node">
        <p>first decision</p>
        <p>這個專案要給誰使用？</p>
      </div>
      <svg class="fork-svg" viewBox="0 0 958 716" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <marker id="fork-arrow-local" markerWidth="13" markerHeight="13" refX="9.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L10,5 L0,10 Z" fill="rgba(79,138,82,0.78)"></path>
          </marker>
          <marker id="fork-arrow-cloud" markerWidth="13" markerHeight="13" refX="9.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L10,5 L0,10 Z" fill="rgba(43,127,184,0.78)"></path>
          </marker>
        </defs>
        <path class="fork-stroke local" d="M479,212 L268,280" marker-end="url(#fork-arrow-local)"></path>
        <path class="fork-stroke cloud" d="M479,212 L690,280" marker-end="url(#fork-arrow-cloud)"></path>
      </svg>
      <div class="route-card local">
        <span class="tag" style="color: var(--local);">route a</span>
        <h3 class="local-text" style="margin-top: 24px;">只給自己用</h3>
        <p>選地端 localhost。先讓前端、後端、資料庫都在自己的電腦跑起來。</p>
      </div>
      <div class="route-card cloud">
        <span class="tag" style="color: var(--cloud);">route b</span>
        <h3 class="cloud-text" style="margin-top: 24px;">要給別人用</h3>
        <p>選 GCP 雲端全端。後端與資料庫會放到雲端服務上。</p>
      </div>
    </section>
  </div>
</main>
</body>
</html>
