<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>02 · 旅程地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .map-layout {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: 80px;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 80px;
  }

  .top-row h2 {
    max-width: 860px;
  }

  .top-row .subtitle {
    max-width: 640px;
    margin-top: 0;
    font-size: 30px;
  }

  .journey {
    position: relative;
    margin: auto 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 34px;
    align-items: stretch;
  }

  .journey::before {
    content: "";
    position: absolute;
    left: 120px;
    right: 120px;
    top: 81px;
    height: 4px;
    background: var(--line);
  }

  .journey-card {
    position: relative;
    min-height: 400px;
    padding: 40px 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .marker {
    width: 86px;
    height: 86px;
    border-radius: 30px;
    background: var(--white);
    border: 4px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Space Grotesk", sans-serif;
    font-size: 32px;
    font-weight: 800;
  }

  .journey-card:nth-child(1) .marker { border-color: var(--cursor); color: var(--cursor); }
  .journey-card:nth-child(4) .marker { border-color: var(--cloud); color: var(--cloud); }

  .card-copy {
    display: grid;
    gap: 14px;
  }

  .card-copy p:first-child {
    font-size: 34px;
    line-height: 1.16;
    font-weight: 850;
  }

  .card-copy p:last-child {
    color: var(--muted);
    font-size: 24px;
    line-height: 1.45;
    font-weight: 520;
  }

  .decision {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }

  .decision p {
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(255,253,248,0.72);
    font-size: 20px;
    line-height: 1.25;
    font-weight: 700;
    word-break: keep-all;
  }
</style>
</head>
<body>
<main class="slide">
  <div class="masthead">
    <div class="brand"><span class="brand-mark"></span><span>Cursor Onboarding</span></div>
    <p class="page-no">02 / 14</p>
  </div>

  <div class="content map-layout">
    <section class="top-row">
      <div>
        <p class="kicker">lesson map</p>
        <h2>今天只走一條清楚的路</h2>
      </div>
      <p class="subtitle">初學者最容易卡住的不是程式碼，而是「我到底要辦哪些帳號、接到哪裡」。</p>
    </section>

    <section class="journey">
      <div class="node journey-card">
        <div class="marker">1</div>
        <div class="card-copy">
          <p>Cursor 已有帳號</p>
          <p>先把 Cursor 當成你的工作桌：開資料夾、問問題、改程式。</p>
        </div>
      </div>
      <div class="node journey-card">
        <div class="marker">2</div>
        <div class="card-copy">
          <p>註冊 GitHub</p>
          <p>大家常說「Git 帳號」，實務上通常是指 GitHub 帳號。</p>
        </div>
      </div>
      <div class="node journey-card">
        <div class="marker">3</div>
        <div class="card-copy">
          <p>連進 Cursor</p>
          <p>讓 Cursor 能讀取、發布、同步你的程式碼 repository。</p>
        </div>
      </div>
      <div class="node journey-card">
        <div class="marker">4</div>
        <div class="card-copy">
          <p>選擇路線</p>
          <p>看你只是本機練習，還是要把完整服務部署給別人用。</p>
          <div class="decision">
            <p class="local-text">localhost 地端</p>
            <p class="cloud-text">GCP 雲端</p>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
</body>
</html>
